<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doorbell Detector - Notificaciones</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a; color: #e2e8f0; min-height: 100vh;
    }
    header {
      background: #1e293b; padding: 1rem 2rem; border-bottom: 1px solid #334155;
      display: flex; align-items: center; justify-content: space-between;
    }
    h1 { font-size: 1.25rem; font-weight: 600; }
    .status {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.875rem; color: #94a3b8;
    }
    .dot {
      width: 10px; height: 10px; border-radius: 50%; display: inline-block;
    }
    .dot.connected { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
    .dot.disconnected { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
    .controls {
      display: flex; gap: 1rem; align-items: center;
    }
    .controls button {
      background: #334155; color: #e2e8f0; border: 1px solid #475569;
      padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer;
      font-size: 0.8rem; transition: background 0.2s;
    }
    .controls button:hover { background: #475569; }
    .controls button.danger:hover { background: #dc2626; border-color: #dc2626; }

    .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }

    .notification {
      background: #1e293b; border: 1px solid #334155; border-radius: 10px;
      padding: 1rem 1.25rem; margin-bottom: 0.75rem;
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .notification.new {
      border-color: #3b82f6; box-shadow: 0 0 12px rgba(59,130,246,0.15);
    }
    .notification-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 0.4rem;
    }
    .app-name {
      font-size: 0.75rem; color: #64748b; text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .time {
      font-size: 0.75rem; color: #64748b; white-space: nowrap;
    }
    .title {
      font-size: 1rem; font-weight: 600; color: #f1f5f9; margin-bottom: 0.25rem;
    }
    .body {
      font-size: 0.9rem; color: #94a3b8; line-height: 1.4;
    }
    .empty {
      text-align: center; color: #64748b; padding: 4rem 0;
    }
    .empty svg { width: 64px; height: 64px; opacity: 0.3; margin-bottom: 1rem; }
    .counter {
      font-size: 0.875rem; color: #94a3b8;
    }
  </style>
</head>
<body>
  <header>
    <div style="display:flex;align-items:center;gap:1.5rem">
      <h1>Doorbell Detector</h1>
      <span class="counter" id="counter">0 notificaciones</span>
    </div>
    <div class="controls">
      <div class="status" id="status">
        <span class="dot disconnected" id="dot"></span>
        <span id="statusText">Desconectado</span>
      </div>
      <button onclick="location.reload()">Recargar</button>
      <button class="danger" onclick="clearAll()">Limpiar todo</button>
    </div>
  </header>

  <div class="container" id="notifications">
    <div class="empty" id="empty">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
        <path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
      </svg>
      <p>Esperando notificaciones...</p>
      <p style="font-size:0.8rem;margin-top:0.5rem">Las notificaciones aparecerán aquí en tiempo real</p>
    </div>
  </div>

  <script>
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}`;

    let ws;
    let notificationCount = 0;

    function connectWebSocket() {
      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        setConnected(true);
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.type === 'doorbell_ring') {
            addNotification(data);
          }
        } catch (e) {
          console.error('Error parsing message:', e);
        }
      };

      ws.onclose = () => {
        setConnected(false);
        setTimeout(connectWebSocket, 3000);
      };

      ws.onerror = () => {
        ws.close();
      };
    }

    function setConnected(connected) {
      const dot = document.getElementById('dot');
      const statusText = document.getElementById('statusText');
      dot.className = `dot ${connected ? 'connected' : 'disconnected'}`;
      statusText.textContent = connected ? 'Conectado' : 'Desconectado';
    }

    function addNotification(data) {
      const empty = document.getElementById('empty');
      if (empty) empty.remove();

      const container = document.getElementById('notifications');
      const notif = document.createElement('div');
      notif.className = 'notification new';

      const time = new Date(data.received_at);
      const timeStr = time.toLocaleString('es-ES', {
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        day: '2-digit', month: '2-digit',
      });

      notif.innerHTML = `
        <div class="notification-header">
          <span class="app-name">${escapeHtml(data.app_name || 'Desconocido')}</span>
          <span class="time">${timeStr}</span>
        </div>
        <div class="title">${escapeHtml(data.title || '')}</div>
        <div class="body">${escapeHtml(data.body || '')}</div>
      `;

      container.insertBefore(notif, container.firstChild);

      notificationCount++;
      document.getElementById('counter').textContent = `${notificationCount} notificaciones`;

      setTimeout(() => {
        notif.classList.remove('new');
      }, 2000);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function clearAll() {
      try {
        await fetch('/api/notifications', { method: 'DELETE' });
        document.getElementById('notifications').innerHTML = `
          <div class="empty" id="empty">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
              <path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
            <p>Esperando notificaciones...</p>
            <p style="font-size:0.8rem;margin-top:0.5rem">Las notificaciones aparecerán aquí en tiempo real</p>
          </div>
        `;
        notificationCount = 0;
        document.getElementById('counter').textContent = '0 notificaciones';
      } catch (e) {
        console.error('Error clearing notifications:', e);
      }
    }

    connectWebSocket();
  </script>
</body>
</html>
